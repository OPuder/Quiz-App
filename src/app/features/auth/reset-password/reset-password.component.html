<div class="reset-password-container">
    <h2>Passwort zurücksetzen</h2>
  
    <!-- Schritt 1: E-Mail eingeben -->
    <div *ngIf="step === 1">
      <form (submit)="checkEmail()">
        <input type="email" [(ngModel)]="email" placeholder="E-Mail-Adresse" name="email" required />
        <button type="submit">Weiter</button>
        <div *ngIf="emailError" class="error-message">{{ emailError }}</div>
      </form>
    </div>
  
    <!-- Schritt 2: Vorname und Nachname eingeben -->
    <div *ngIf="step === 2">
      <form (submit)="checkName()">
        <input type="text" [(ngModel)]="firstName" placeholder="Vorname" name="firstName" required />
        <input type="text" [(ngModel)]="lastName" placeholder="Nachname" name="lastName" required />
        <button type="submit">Weiter</button>
        <div *ngIf="nameError" class="error-message">{{ nameError }}</div>
      </form>
    </div>
  
    <!-- Schritt 3: Sicherheitsfrage beantworten -->
    <div *ngIf="step === 3">
      <form (submit)="checkSecurityAnswer()">
        <label for="securityQuestion">{{ securityQuestion }}</label>
        <input type="text" [(ngModel)]="securityAnswer" placeholder="Antwort" name="securityAnswer" required />
        <button type="submit">Weiter</button>
        <div *ngIf="securityError" class="error-message">{{ securityError }}</div>
      </form>
    </div>
  
    <!-- Schritt 4: Neues Passwort setzen -->
    <div *ngIf="step === 4">
      <form (submit)="resetPassword()">
        <input type="password" [(ngModel)]="newPassword" placeholder="Neues Passwort" name="newPassword" required />
        <input type="password" [(ngModel)]="confirmPassword" placeholder="Passwort bestätigen" name="confirmPassword" required />
        <button type="submit">Passwort zurücksetzen</button>
        <div *ngIf="passwordError" class="error-message">{{ passwordError }}</div>
      </form>
    </div>
  </div>
