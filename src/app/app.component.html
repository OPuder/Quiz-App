<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

<main>
<div class="Quiz" >
  <h1 i18n class="gradient-title" >Willkommen auf einer Quizseite zum Lernen von JavaScript, TypeScript und Angular</h1>
  <nav class="custom-navbar">
    <div class="nav-left">
      <a routerLink="/app-startseite">🏠 Home</a>
      <a routerLink="/app-wissenwertes">📘 Wissen</a>
      <li class="nav-item dropdown">
        <a class="nav-link dropdown-toggle" href="#" id="quizDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
          🧩 Quiz Auswahl
        </a>
        <ul class="dropdown-menu">
          <li><a class="dropdown-item" routerLink="/app-java-script-startseite">📜 JavaScript</a></li>
          <li><a class="dropdown-item" routerLink="/app-type-script-startseite">⚙️ TypeScript</a></li>
          <li><a class="dropdown-item" routerLink="/app-angular-startseite">🅰️ Angular</a></li>
        </ul>
      </li>
      <a *ngIf="authService.isLoggedIn()" routerLink="/app-score-board">🏆 Scoreboard</a>
    </div>
  
    <div class="nav-right">
      <a *ngIf="authService.isAdmin()" routerLink="/app-admin">🛠️ Admin</a>
      <a *ngIf="!authService.isLoggedIn()" routerLink="/app-login">🔐 Login/Registrieren</a>
      <button *ngIf="authService.isLoggedIn()" (click)="logout()">🚪 Logout</button>
    </div>
  </nav>
</div>
</main>
